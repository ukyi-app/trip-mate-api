# main 머지 = 빌드 + GHCR push + homelab bump-poll 즉시 디스패치(reusable 흡수 deploy-trigger).
# 빌드·디스패치 로직 SSOT는 homelab reusable-app-build.yaml@main. 여기선 시크릿 쌍만 passthrough
# (HOMELAB_DISPATCH_APP 미프로비저닝이면 reusable이 clean skip — homelab 크론 폴링이 백스톱).
name: release
on:
  push:
    branches: [main]
permissions:
  contents: read
  packages: write
jobs:
  release:
    uses: ukyi-app/homelab/.github/workflows/reusable-app-build.yaml@main
    with:
      app: ${{ github.event.repository.name }}
    secrets:
      HOMELAB_DISPATCH_APP_ID: ${{ secrets.HOMELAB_DISPATCH_APP_ID }}
      HOMELAB_DISPATCH_APP_PRIVATE_KEY: ${{ secrets.HOMELAB_DISPATCH_APP_PRIVATE_KEY }}
